{% extends 'templates/_base.html' %}

<title>
  {% block title %}Posts{% endblock %}
</title>

{% block content %}

<section id="article-listing">
  <h2>My Posts</h2>

 <ul id="articles">
  {% for post in posts %}
  <li>
    <a href="/{{ post.href }}">{{ post.title }}</a>
    <span class="date">{{ post.date.strftime('%Y-%m-%d') }}</span>
  </li>
  {% endfor %}
 </ul>
</section>

{% endblock %}
